services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: kagami-server:latest
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@host.docker.internal:5432/kagami}
      LLM_ACTIVE_PROVIDER: ${LLM_ACTIVE_PROVIDER}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL}
      DEEPSEEK_CHAT_MODEL: ${DEEPSEEK_CHAT_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL}
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - axis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: kagami-web:latest
    depends_on:
      - server
    ports:
      - "32004:80"
    restart: unless-stopped
    networks:
      - axis

networks:
  axis:
    name: ${NETWORK}
    external: true
