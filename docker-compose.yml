services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: kagami-server:latest
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@host.docker.internal:5432/kagami}
    ports:
      - "3000:3000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: kagami-web:latest
    depends_on:
      - server
    ports:
      - "8080:80"
    restart: unless-stopped
