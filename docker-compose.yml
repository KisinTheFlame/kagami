services:
  napcat:
    container_name: napcat
    image: mlikiowa/napcat-docker:latest
    hostname: napcat
    ports:
      - "6099:6099"
    environment:
      - NAPCAT_UID=${NAPCAT_UID:-501}
      - NAPCAT_GID=${NAPCAT_GID:-20}
    volumes:
      - napcat-config:/app/napcat/config
      - napcat-qq:/app/.config/QQ
    restart: unless-stopped
    networks:
      - axis

  server:
    container_name: kagami-server
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: kagami-server:latest
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      LLM_ACTIVE_PROVIDER: ${LLM_ACTIVE_PROVIDER}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL}
      DEEPSEEK_CHAT_MODEL: ${DEEPSEEK_CHAT_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL}
      TZ: ${TZ:-Asia/Shanghai}
      NAPCAT_WS_URL: ${NAPCAT_WS_URL:-ws://napcat:3001/}
      NAPCAT_WS_RECONNECT_MS: ${NAPCAT_WS_RECONNECT_MS:-3000}
      NAPCAT_WS_REQUEST_TIMEOUT_MS: ${NAPCAT_WS_REQUEST_TIMEOUT_MS:-10000}
      NAPCAT_LISTEN_GROUP_ID: ${NAPCAT_LISTEN_GROUP_ID:?NAPCAT_LISTEN_GROUP_ID is required}
      BOT_QQ: ${BOT_QQ:?BOT_QQ is required}
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - axis

  web:
    container_name: kagami-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: kagami-web:latest
    depends_on:
      - server
    ports:
      - "20004:80"
    restart: unless-stopped
    networks:
      - axis

networks:
  axis:
    name: ${NETWORK}
    external: true

volumes:
  napcat-config:
  napcat-qq:
