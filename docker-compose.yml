services:
  napcat:
    container_name: napcat
    image: mlikiowa/napcat-docker:latest
    hostname: napcat
    ports:
      - "6099:6099"
    environment:
      - NAPCAT_UID=${NAPCAT_UID:-501}
      - NAPCAT_GID=${NAPCAT_GID:-20}
    volumes:
      - napcat-config:/app/napcat/config
      - napcat-qq:/app/.config/QQ
    restart: unless-stopped
    networks:
      - axis

  server:
    container_name: kagami-server
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: kagami-server:latest
    environment:
      NODE_ENV: production
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./gaia.config.yml:/app/gaia.config.yml:ro
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - axis

  web:
    container_name: kagami-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: kagami-web:latest
    depends_on:
      - server
    ports:
      - "20004:80"
    restart: unless-stopped
    networks:
      - axis

networks:
  axis:
    name: ${NETWORK}
    external: true

volumes:
  napcat-config:
  napcat-qq:
