name: CI

on:
  pull_request:
  push:
    branches: [master]

# 同一分支的新推送取消仍在跑的旧 run，节省 CI 时间。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      # pnpm/action-setup 读 package.json 的 packageManager 字段，安装对应版本 pnpm。
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # build / typecheck / lint / format / test 全部 config-free：
      # prisma generate 用占位 DATABASE_URL（见 scripts/prisma.sh），测试不读运行时 config。
      #
      # build 必须先跑：typecheck / lint（type-aware）/ test 都经包间 exports 解析到
      # dist，build 是硬屏障。build 之后四个检查彼此独立，交给 ci-checks.sh 并行跑、
      # 隔离日志、聚合退出码，把墙钟从串行 ~173s 压到 build + max(检查)。
      - name: Build
        run: pnpm build

      - name: Checks (typecheck / lint / format / test, parallel)
        run: bash scripts/ci-checks.sh
