name: CI

on:
  pull_request:
  push:
    branches: [master]

# 同一分支的新推送取消仍在跑的旧 run，节省 CI 时间。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      # pnpm/action-setup 读 package.json 的 packageManager 字段，安装对应版本 pnpm。
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # build / typecheck / lint / format / test 全部 config-free：
      # prisma generate 用占位 DATABASE_URL（见 scripts/prisma.sh），测试不读运行时 config。
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format

      - name: Test
        run: pnpm test
